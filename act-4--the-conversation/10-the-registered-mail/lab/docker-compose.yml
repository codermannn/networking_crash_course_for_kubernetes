version: '3.8'

services:
  sender:
    build:
      context: ..
      dockerfile: lab/Dockerfile
    container_name: tcp_sender
    cap_add:
      - NET_ADMIN # Required to modify the traffic control (tc) queues
    volumes:
      - ../code:/lab/code
    stdin_open: true
    tty: true

  receiver:
    build:
      context: ..
      dockerfile: lab/Dockerfile
    container_name: tcp_receiver
    volumes:
      - ../code:/lab/code
    stdin_open: true
    tty: true
